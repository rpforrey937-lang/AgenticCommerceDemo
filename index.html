<!DOCTYPE html>
<html>
<head>
<title>Agentic Commerce Demo</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
background:#0070ba;
color:white;
border:none;
padding:14px 24px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005ea6;
}

.step{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h2>Agentic Commerce Demo</h2>

<p>Watch an AI shopping agent complete a purchase automatically.</p>

<button onclick="startDemo()">Run Demo</button>

<div class="step" id="step1"></div>
<div class="step" id="step2"></div>
<div class="step" id="step3"></div>
<div class="step" id="step4"></div>

</div>

<script>

function startDemo(){

document.getElementById("step1").innerHTML = "🔎 Detecting purchase intent...";
setTimeout(()=>{
document.getElementById("step2").innerHTML = "🪙 Generating agentic token...";
},2000);

setTimeout(()=>{
document.getElementById("step3").innerHTML = "🛒 Completing checkout...";
},4000);

setTimeout(()=>{
document.getElementById("step4").innerHTML = "✅ Payment completed successfully.";
},6000);

}

</script>

</body>
</html>
